name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: Version string to embed in binaries
        required: true
        default: dev

permissions:
  contents: read

jobs:
  authorize:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Restrict manual dispatch to repository owner
        if: github.event_name == 'workflow_dispatch' && github.actor != github.repository_owner
        run: |
          echo "::error::Manual release dispatch is restricted to ${GITHUB_REPOSITORY_OWNER}."
          exit 1

  release:
    needs: authorize
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22.x"

      - name: Build release artifacts
        shell: bash
        run: |
          version="${GITHUB_REF_NAME}"
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            version="${{ inputs.version }}"
          fi
          make release VERSION="${version}"

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: zen-proxy-dist
          path: dist/

  publish:
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    needs: release
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
    steps:
      - name: Download workflow artifact
        uses: actions/download-artifact@v4
        with:
          name: zen-proxy-dist
          path: dist

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release view "${GITHUB_REF_NAME}" >/dev/null 2>&1; then
            gh release upload "${GITHUB_REF_NAME}" dist/* --clobber
          else
            gh release create "${GITHUB_REF_NAME}" dist/* --title "${GITHUB_REF_NAME}" --generate-notes
          fi
