name: CI

on:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22.x"

      - name: Test
        run: make test

      - name: Vet
        run: make vet

      - name: Cross-build release artifacts
        run: make dist VERSION=ci

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: zen-proxy-dist
          path: dist/
